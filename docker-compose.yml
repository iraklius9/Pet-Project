services:
  postgres:
    image: postgres:15
    env_file:
      - .env
    ports:
      - "5431:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "postgres" ]
      interval: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7
    ports:
      - "6378:6379"
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_LOG_LEVEL: warning
    restart: unless-stopped

  web1:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      SERVER_ID: SERVER-1
    depends_on:
      - postgres
      - redis
      - rabbitmq
    restart: unless-stopped

  web2:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      SERVER_ID: SERVER-2
    depends_on:
      - postgres
      - redis
      - rabbitmq
    restart: unless-stopped

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["celery", "-A", "src.celery_app", "worker", "-l", "info"]
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
      - rabbitmq
    restart: unless-stopped

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx:/etc/nginx/conf.d
    depends_on:
      - web1
      - web2
    restart: unless-stopped

volumes:
  postgres_data: {}
